{{- if eq .Values.config.auth.multi.setup "auto" }}
---
# ServiceAccount used by the vault-config Job (configures Vault AppRole)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
# Role: allows vault-config Job to read Vault pods and manage secrets in the release namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-config
subjects:
- kind: ServiceAccount
  name: vault-config
  namespace: {{ .Release.Namespace }}
{{- end }}
