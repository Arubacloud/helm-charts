{{- if eq .Values.config.auth.multi.setup "auto" }}
---
# vault-config-job: post-install hook that configures Vault with AppRole auth and writes
# the vault-approle-credentials Secret consumed by the operator Deployment initContainer.
# Uses two containers sharing an emptyDir:
#   1. configure-vault (hashicorp/vault) — configures AppRole, writes role-id/secret-id to /creds
#   2. write-secret    (bitnami/kubectl)  — creates the vault-approle-credentials K8s Secret
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "operator.fullname" . }}-vault-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: vault-config
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-vault
        image: hashicorp/vault:latest
        command:
        - sh
        - -c
        - |
          set -e
          echo "Waiting for Vault to be ready..."
          until vault status 2>/dev/null; do
            echo "Vault not ready yet, retrying in 5 seconds..."
            sleep 5
          done
          echo "Vault is ready!"
        env:
        - name: VAULT_ADDR
          value: "http://vault.{{ .Release.Namespace }}.svc:8200"
        - name: VAULT_SKIP_VERIFY
          value: "true"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
      containers:
      # Step 1: configure Vault and write credentials to shared emptyDir
      - name: configure-vault
        image: hashicorp/vault:latest
        command:
        - sh
        - -c
        - |
          set -e

          echo "Configuring Vault..."

          vault auth enable approle 2>/dev/null || echo "AppRole already enabled"

          vault policy write operator-policy /vault/config/operator-policy.hcl

          vault write auth/approle/role/operator-role \
            token_policies="operator-policy" \
            secret_id_ttl=0 \
            secret_id_num_uses=0 \
            token_ttl=1h \
            token_max_ttl=4h

          vault secrets enable -path=kv kv-v2 2>/dev/null || echo "KV already enabled"

          ROLE_ID=$(vault read -field=role_id auth/approle/role/operator-role/role-id)
          SECRET_ID=$(vault write -field=secret_id -f auth/approle/role/operator-role/secret-id)

          echo -n "$ROLE_ID"   > /creds/role-id
          echo -n "$SECRET_ID" > /creds/secret-id

          echo "Vault configuration complete. Credentials written to /creds."
        env:
        - name: VAULT_ADDR
          value: "http://vault.{{ .Release.Namespace }}.svc:8200"
        - name: VAULT_SKIP_VERIFY
          value: "true"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-init-token
              key: token
        volumeMounts:
        - name: policy
          mountPath: /vault/config
          readOnly: true
        - name: creds
          mountPath: /creds
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      # Step 2: patch the operator config Secret with the credentials from step 1
      - name: write-secret
        image: bitnami/kubectl:latest
        command:
        - sh
        - -c
        - |
          set -e

          echo "Waiting for credentials files..."
          until [ -s /creds/role-id ] && [ -s /creds/secret-id ]; do
            sleep 2
          done

          ROLE_ID_B64=$(base64 < /creds/role-id | tr -d '\n\r')
          SECRET_ID_B64=$(base64 < /creds/secret-id | tr -d '\n\r')

          echo "Patching operator config secret {{ include "operator.config" . }}..."
          kubectl patch secret {{ include "operator.config" . }} \
            --namespace={{ .Release.Namespace }} \
            --type merge \
            -p "{\"data\":{\"role-id\":\"${ROLE_ID_B64}\",\"secret-id\":\"${SECRET_ID_B64}\"}}"

          echo "Done. Operator config secret patched with AppRole credentials."
        volumeMounts:
        - name: creds
          mountPath: /creds
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
      volumes:
      - name: policy
        configMap:
          name: vault-operator-policy
      - name: creds
        emptyDir:
          medium: Memory
{{- end }}
