{{- if eq .Values.config.auth.multi.setup "auto" }}
---
# cleanup-hook: pre-install hook that removes any orphaned vault-auto resources left
# by a previous install (e.g. resources that were hooks before becoming regular resources).
# Safe to run on a clean cluster — kubectl delete --ignore-not-found is idempotent.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "operator.fullname" . }}-vault-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-25"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: vault-cleanup
    spec:
      serviceAccountName: {{ include "operator.fullname" . }}-vault-cleanup
      restartPolicy: Never
      containers:
      - name: cleanup
        image: bitnami/kubectl:latest
        command:
        - sh
        - -c
        - |
          set -e
          NS={{ .Release.Namespace }}
          echo "Cleaning up orphaned vault-auto resources in namespace $NS..."
          kubectl delete serviceaccount vault-config              -n $NS --ignore-not-found
          kubectl delete role          vault-config              -n $NS --ignore-not-found
          kubectl delete rolebinding   vault-config              -n $NS --ignore-not-found
          kubectl delete secret        vault-init-token          -n $NS --ignore-not-found
          kubectl delete configmap     vault-operator-policy     -n $NS --ignore-not-found
          echo "Cleanup complete."
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
---
# Minimal ServiceAccount + RBAC for the cleanup Job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "operator.fullname" . }}-vault-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "operator.fullname" . }}-vault-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["serviceaccounts", "secrets", "configmaps"]
  verbs: ["delete", "get"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "operator.fullname" . }}-vault-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "operator.fullname" . }}-vault-cleanup
subjects:
- kind: ServiceAccount
  name: {{ include "operator.fullname" . }}-vault-cleanup
  namespace: {{ .Release.Namespace }}
{{- end }}
