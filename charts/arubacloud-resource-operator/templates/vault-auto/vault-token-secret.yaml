{{- if eq .Values.config.auth.multi.setup "auto" }}
---
# vault-init-token: the dev root token used by the config Job to authenticate with Vault.
# WARNING: This is only safe in dev mode. In production, replace with a properly managed token.
apiVersion: v1
kind: Secret
metadata:
  name: vault-init-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  token: {{ .Values.config.auth.multi.vault.auto.devRootToken | quote }}
{{- end }}
