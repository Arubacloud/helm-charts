apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "operator.controllerManagerName" . }}
  labels:
    control-plane: controller-manager
  {{- include "operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aruba
      control-plane: controller-manager
    {{- include "operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aruba
        control-plane: controller-manager
      {{- include "operator.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --config-map-name={{ include "operator.config" . }}
        - --secret-name={{ include "operator.config" . }}
        - --namespace=$(POD_NAMESPACE)
        command:
        - /manager
        env:
        - name: CONFIG_MAP_NAME
          value: {{ include "operator.controllerManagerName" . }}
        - name: SECRET_NAME
          value: {{ include "operator.controllerManagerName" . }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
{{- if eq .Values.config.auth.mode "multi" }}
  {{- if eq .Values.config.auth.multi.setup "auto" }}
  {{- /* In auto mode credentials are patched directly into the operator config Secret by vault-config-job. */}}
  {{- else }}
    {{- if .Values.config.auth.multi.vault.roleIdFrom.secretKeyRef.name }}
        - name: ROLE_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.auth.multi.vault.roleIdFrom.secretKeyRef.name }}
              key: {{ .Values.config.auth.multi.vault.roleIdFrom.secretKeyRef.key }}
    {{- end }}
    {{- if .Values.config.auth.multi.vault.roleSecretFrom.secretKeyRef.name }}
        - name: ROLE_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.config.auth.multi.vault.roleSecretFrom.secretKeyRef.name }}
              key: {{ .Values.config.auth.multi.vault.roleSecretFrom.secretKeyRef.key }}
    {{- end }}
  {{- end }}
{{- end }}
        image: {{ .Values.controller.manager.image.repository }}:{{ .Values.controller.manager.image.tag
          | default .Chart.AppVersion }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controller.manager.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.controller.manager.containerSecurityContext
          | nindent 10 }}
{{- if eq .Values.config.auth.multi.setup "auto" }}
      initContainers:
      - name: wait-for-vault-credentials
        image: bitnami/kubectl:latest
        command:
        - sh
        - -c
        - |
          echo "Waiting for vault-approle-credentials secret to exist..."
          until [ "$(kubectl get secret {{ include "operator.config" . }} --namespace=$POD_NAMESPACE -o jsonpath='{.data.role-id}' 2>/dev/null)" != "" ]; do
            echo "Waiting for role-id to be populated in operator config secret..."
            sleep 5
          done
          echo "Operator config secret has credentials, starting."
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
{{- end }}
      nodeSelector: {{- toYaml .Values.controller.nodeSelector | nindent 8 }}
      securityContext: {{- toYaml .Values.controller.podSecurityContext | nindent
        8 }}
      serviceAccountName: {{ include "operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      tolerations: {{- toYaml .Values.controller.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.controller.topologySpreadConstraints
        | nindent 8 }}
